            indicator.innerHTML += `<div class="power-up-badge double-jump">Double Jump <span class="timer">${Math.ceil(this.player.doubleJumpTime)}s</span></div>`;
          }
          if (this.slowMotion) {
            indicator.innerHTML += `<div class="power-up-badge slow-motion">Slow Mo <span class="timer">${Math.ceil(this.slowMotionTime)}s</span></div>`;
          }
          if (this.player.hasMagnet) {
            indicator.innerHTML += `<div class="power-up-badge magnet">Magnet <span class="timer">${Math.ceil(this.player.magnetTime)}s</span></div>`;
          }
          if (this.player.isInvincible) {
            indicator.innerHTML += `<div class="power-up-badge invincible">Invincible <span class="timer">${Math.ceil(this.player.invincibleTime)}s</span></div>`;
          }
          if (this.player.speedBoost) {
            indicator.innerHTML += `<div class="power-up-badge speed">Speed <span class="timer">${Math.ceil(this.player.speedTime)}s</span></div>`;
          }
        }

        update(dt) {
          if (this.state !== "playing") return;

          const effectiveDt = this.slowMotion ? dt * 0.5 : dt;

          this.gameTime += effectiveDt;
          this.distance += (this.gameSpeed * effectiveDt) / 50;
          this.score += Math.floor(effectiveDt * 10);

          // Combo timer
          if (this.comboTimer > 0) {
            this.comboTimer -= effectiveDt;
            if (this.comboTimer <= 0) {
              this.combo = 0;
            }
          }

          // Check milestones
          this.checkMilestones();

          // Difficulty scaling
          if (this.gameTime > 20 && !this.player.speedBoost) {
            this.gameSpeed =
              this.baseSpeed + Math.floor(this.gameTime / 20) * 30;
            this.spawnInterval = Math.max(
              0.5,
              1.5 - Math.floor(this.gameTime / 20) * 0.12,
            );
          }

          // Night mode
          if (this.gameTime > 60 && !this.nightMode) {
            this.nightMode = true;
          }

          // Slow motion timer
          if (this.slowMotion) {
            this.slowMotionTime -= effectiveDt;
            if (this.slowMotionTime <= 0) this.slowMotion = false;
          }

          // Screen shake
          if (this.shakeDuration > 0) {
            this.shakeDuration -= dt;
          }

          // Spawn obstacles
          this.spawnTimer += effectiveDt;
          if (this.spawnTimer >= this.spawnInterval) {
            this.spawnTimer = 0;
            this.spawnObstacle();
            if (Math.random() > 0.4) {
              this.spawnCollectible();
            }
          }

          // Update player
          this.player.update(effectiveDt, this.canvas.height, this.groundY);

          // Landing particles
          if (
            this.player.grounded &&
            this.player.vy === 0 &&
            this.player.isJumping
          ) {
            this.particles.emit(
              this.player.x + this.player.width / 2,
              this.player.y + this.player.height,
              6,
              {
                angle: -Math.PI / 2,
                spread: Math.PI / 3,
                speedMin: 30,
                speedMax: 80,
                colors: ["#ffffff", "#a8e6f0"],
                sizeMin: 2,
                sizeMax: 4,
                lifeMin: 0.2,
                lifeMax: 0.4,
              },
            );
          }

          // Update obstacles
          this.obstacles = this.obstacles.filter((o) => {
            o.update(effectiveDt, this.gameSpeed, this.player.x);
            return o.x > -o.width && o.y < this.canvas.height + 50;
          });

          // Update collectibles
          this.collectibles = this.collectibles.filter((c) => {
            c.update(
              effectiveDt,
              this.gameSpeed,
              this.gameTime,
              this.player.x + this.player.width / 2,
              this.player.y + this.player.height / 2,
              this.player.hasMagnet,
            );
            return c.x > -c.width && !c.collected;
          });

          // Update particles
          this.particles.update(effectiveDt);

          // Update floating texts
          this.floatingTexts = this.floatingTexts.filter((t) =>
            t.update(effectiveDt),
          );

          // Update milestone popups
          this.milestonePopups = this.milestonePopups.filter((m) => {
            m.time += dt;
            return m.time < 1.5;
          });

          // Update background
          this.updateBackground(effectiveDt);

          // Check collisions
          this.checkCollisions();

          // Update UI
          this.updateUI();
        }

        updateBackground(dt) {
          // Update clouds
          this.clouds.forEach((cloud) => {
            cloud.x -= this.gameSpeed * cloud.speed * dt;
            if (cloud.x < -cloud.width) {
              cloud.x = this.canvas.width + cloud.width;
            }
          });

          // Update mountains
          this.mountains.forEach((mt) => {
            mt.x -= this.gameSpeed * 0.1 * dt;
            if (mt.x < -mt.width) {
              mt.x = this.canvas.width + mt.width;
            }
          });

          // Update icebergs
          this.icebergs.forEach((ib) => {
            ib.x -= this.gameSpeed * 0.3 * dt;
            if (ib.x < -ib.width) {
              ib.x = this.canvas.width + ib.width;
            }
          });

          // Update snowflakes
          this.snowflakes.forEach((sf) => {
            sf.y += sf.speed * dt;
            sf.x += Math.sin(sf.wobble + this.gameTime) * 20 * dt;
            if (sf.y > this.canvas.height) {
              sf.y = -10;
              sf.x = Math.random() * this.canvas.width;
            }
          });
        }

        drawBackground() {
          const ctx = this.ctx;
          const w = this.canvas.width;
          const h = this.canvas.height;

          // Sky gradient
          const skyGradient = ctx.createLinearGradient(0, 0, 0, h);
          if (this.nightMode) {
            skyGradient.addColorStop(0, "#0a0a1a");
            skyGradient.addColorStop(0.5, "#1a1a3a");
            skyGradient.addColorStop(1, "#2a2a4a");
          } else {
            skyGradient.addColorStop(0, "#0a1628");
            skyGradient.addColorStop(0.5, "#132744");
            skyGradient.addColorStop(1, "#1d3a5c");
          }
          ctx.fillStyle = skyGradient;
          ctx.fillRect(0, 0, w, h);

          // Stars (night mode)
          if (this.nightMode) {
            ctx.fillStyle = "#ffffff";
            for (let i = 0; i < 50; i++) {
              const sx = (i * 137 + Math.sin(i) * 50) % w;
              const sy = (i * 73 + Math.cos(i) * 30) % (h * 0.6);
              const size = 1 + Math.sin(this.gameTime * 2 + i) * 0.5;
              ctx.beginPath();
              ctx.arc(sx, sy, size, 0, Math.PI * 2);
              ctx.fill();
            }

            // Aurora
            ctx.globalAlpha = 0.3;
            for (let i = 0; i < 3; i++) {
              const gradient = ctx.createLinearGradient(
                0,
                50 + i * 30,
                w,
                80 + i * 30,
              );
              gradient.addColorStop(0, "transparent");
              gradient.addColorStop(0.3, "#5bc4d4");
              gradient.addColorStop(0.5, "#b794f6");
              gradient.addColorStop(0.7, "#5bc4d4");
              gradient.addColorStop(1, "transparent");
              ctx.fillStyle = gradient;
              ctx.fillRect(0, 30 + i * 40, w, 30);
            }
            ctx.globalAlpha = 1;
          }

          // Moon/Sun
          if (this.nightMode) {
            ctx.fillStyle = "#f0f4f8";
            ctx.beginPath();
            ctx.arc(w - 80, 60, 30, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#0a0a1a";
            ctx.beginPath();
            ctx.arc(w - 65, 55, 25, 0, Math.PI * 2);
            ctx.fill();
          }

          // Clouds
          ctx.fillStyle = this.nightMode
            ? "rgba(60, 60, 100, 0.3)"
            : "rgba(168, 230, 240, 0.2)";
          this.clouds.forEach((cloud) => {
            ctx.beginPath();
            ctx.ellipse(
              cloud.x,
              cloud.y,
              cloud.width / 2,
              20,
              0,
              0,
              Math.PI * 2,
            );
            ctx.ellipse(
              cloud.x - 30,
              cloud.y + 10,
              cloud.width / 3,
              15,
              0,
              0,
              Math.PI * 2,
            );
            ctx.ellipse(
              cloud.x + 30,
              cloud.y + 5,
              cloud.width / 3,
              18,
              0,
              0,
              Math.PI * 2,
            );
            ctx.fill();
          });

          // Mountains
          this.mountains.forEach((mt) => {
            const mtGradient = ctx.createLinearGradient(
              mt.x,
              h - this.groundY - mt.height,
              mt.x,
              h - this.groundY,
            );
            mtGradient.addColorStop(0, this.nightMode ? "#1a2a4a" : "#2d4a6a");
            mtGradient.addColorStop(1, this.nightMode ? "#0a1a3a" : "#1a3a5a");
            ctx.fillStyle = mtGradient;

            ctx.beginPath();
            ctx.moveTo(mt.x, h - this.groundY);
            ctx.lineTo(mt.x + mt.width / 2, h - this.groundY - mt.height);
            ctx.lineTo(mt.x + mt.width, h - this.groundY);
            ctx.closePath();
            ctx.fill();

            // Snow cap
            ctx.fillStyle = this.nightMode ? "#3a4a6a" : "#a8e6f0";
            ctx.beginPath();
            ctx.moveTo(
              mt.x + mt.width / 2 - 15,
              h - this.groundY - mt.height + 20,
            );
            ctx.lineTo(mt.x + mt.width / 2, h - this.groundY - mt.height);
            ctx.lineTo(
              mt.x + mt.width / 2 + 15,
              h - this.groundY - mt.height + 20,
            );
            ctx.closePath();
            ctx.fill();
          });

          // Icebergs
          this.icebergs.forEach((ib) => {
            const ibGradient = ctx.createLinearGradient(
              ib.x,
              h - this.groundY - ib.height,
              ib.x,
              h - this.groundY,
            );
            ibGradient.addColorStop(0, this.nightMode ? "#3a5a7a" : "#5bc4d4");
            ibGradient.addColorStop(1, this.nightMode ? "#2a4a6a" : "#a8e6f0");
            ctx.fillStyle = ibGradient;

            ctx.beginPath();
            ctx.moveTo(ib.x, h - this.groundY);
            ctx.lineTo(ib.x + ib.width / 2, h - this.groundY - ib.height);
            ctx.lineTo(ib.x + ib.width, h - this.groundY);
            ctx.closePath();
            ctx.fill();
          });

          // Ground
          const groundGradient = ctx.createLinearGradient(
            0,
            h - this.groundY,
            0,
            h,
          );
          groundGradient.addColorStop(
            0,
            this.nightMode ? "#1a3a5a" : "#a8e6f0",
          );
          groundGradient.addColorStop(
            0.3,
            this.nightMode ? "#0a2a4a" : "#5bc4d4",
          );
          groundGradient.addColorStop(
            1,
            this.nightMode ? "#0a1a3a" : "#2d8a9e",
          );
          ctx.fillStyle = groundGradient;
          ctx.fillRect(0, h - this.groundY, w, this.groundY);

          // Ice texture lines
          ctx.strokeStyle = this.nightMode
            ? "rgba(100, 140, 180, 0.3)"
            : "rgba(255, 255, 255, 0.3)";
          ctx.lineWidth = 1;
          for (let i = 0; i < 10; i++) {
            const lineX =
              i * 150 - ((this.gameTime * this.gameSpeed * 0.5) % 150);
            ctx.beginPath();
            ctx.moveTo(lineX, h - this.groundY + 10);
            ctx.lineTo(lineX + 100, h - this.groundY + 30);
            ctx.stroke();
          }

          // Snowflakes
          ctx.fillStyle = this.nightMode
            ? "rgba(200, 220, 255, 0.6)"
            : "rgba(255, 255, 255, 0.8)";
          this.snowflakes.forEach((sf) => {
            ctx.beginPath();
            ctx.arc(sf.x, sf.y, sf.size, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        render() {
          // Screen shake
          let shakeX = 0;
          let shakeY = 0;
          if (this.shakeDuration > 0) {
            shakeX = (Math.random() - 0.5) * this.shakeIntensity;
            shakeY = (Math.random() - 0.5) * this.shakeIntensity;
          }

          this.ctx.save();
          this.ctx.translate(shakeX, shakeY);

          this.ctx.clearRect(
            -10,
            -10,
            this.canvas.width + 20,
            this.canvas.height + 20,
          );

          // Draw background
          this.drawBackground();

          // Draw game objects
          this.obstacles.forEach((o) => o.draw(this.ctx));
          this.collectibles.forEach((c) => c.draw(this.ctx));
          this.player.draw(this.ctx);
          this.particles.draw(this.ctx);
          this.floatingTexts.forEach((t) => t.draw(this.ctx));

          // Milestone popups
          this.milestonePopups.forEach((m) => {
            const alpha =
              m.time < 0.3
                ? m.time / 0.3
                : m.time > 1.2
                  ? (1.5 - m.time) / 0.3
                  : 1;
            this.ctx.save();
            this.ctx.globalAlpha = alpha;
            this.ctx.font = "bold 48px Fredoka";
            this.ctx.fillStyle = "#ffd93d";
            this.ctx.textAlign = "center";
            this.ctx.shadowColor = "#ffd93d";
            this.ctx.shadowBlur = 20;
            this.ctx.fillText(
              m.text,
              this.canvas.width / 2,
              this.canvas.height / 2 - 50 + m.time * 30,
            );
            this.ctx.restore();
          });

          // Pause overlay
          if (this.state === "paused") {
            this.ctx.fillStyle = "rgba(10, 22, 40, 0.7)";
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.ctx.font = "bold 48px Fredoka";
            this.ctx.fillStyle = "#a8e6f0";
            this.ctx.textAlign = "center";
            this.ctx.fillText(
              "PAUSED",
              this.canvas.width / 2,
              this.canvas.height / 2,
            );
          }

          // Slow motion effect
          if (this.slowMotion && this.state === "playing") {
            this.ctx.fillStyle = "rgba(183, 148, 246, 0.1)";
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
          }

          this.ctx.restore();
        }

        gameLoop(timestamp) {
          const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
          this.lastTime = timestamp;

          this.update(dt);
          this.render();

          requestAnimationFrame((t) => this.gameLoop(t));
        }
      }

      // ========== INITIALIZE GAME ==========
      document.addEventListener("DOMContentLoaded", () => {
        new Game();
      });
    </script>
  </body>
</html>
